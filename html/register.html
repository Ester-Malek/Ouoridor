<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/register.css">
</head>
<body>
    <div class="form-container">

        <h1>הרשמה</h1>
        <p>אנא הירשמו כדי להתחיל</p>

        <form class="login-form" id="authForm">
            <input type="text" id="username" placeholder="שם משתמש" required minlength="3">
            <input type="email" id="email" placeholder="אימייל" required>
            <input type="password" id="password" placeholder="סיסמה" required minlength="6">
                <button type="submit" class="landing-btn login-btn">להתחלת המשחק</button>
        </form>
    </div>
</body>
</html>
